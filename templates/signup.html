<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - MessPro</title>
    <style>
        body { background: #0B1026; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .card { background: #151c36; padding: 30px; border-radius: 20px; width: 320px; text-align: center; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: #0B1026; color: white; }
        button { width: 100%; padding: 12px; background: #2962FF; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Create Account</h2>
        <form method="POST">
            <input type="text" name="first_name" placeholder="First Name" required>
            <input type="text" name="last_name" placeholder="Last Name" required>
            <input type="text" name="username" placeholder="Roll Number (Username)" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">SIGN UP</button>
        </form>
        <p>Already have an account? <a href="/login" style="color:#2962FF">Login</a></p>
    </div>
</body>
</html>
