<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Expense Tracker</title>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#0056b3">
    <link rel="icon" href="{{ url_for('static', filename='logo.png') }}" sizes="192x192">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='logo.png') }}">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Expense Tracker">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background: radial-gradient(circle at top left, rgba(49, 121, 255, 0.16), transparent 30%),
                        radial-gradient(circle at bottom right, rgba(34, 209, 161, 0.12), transparent 25%),
                        linear-gradient(180deg, #08112a 0%, #05070a 100%);
            color: #f2f8ff;
            padding: 20px;
        }

        .auth-card {
            width: min(450px, 100%);
            height: auto;
            background: rgba(12, 20, 45, 0.88);
            border: 1px solid rgba(45, 112, 245, 0.4);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 28px 70px rgba(43, 49, 204, 0.35);
            backdrop-filter: blur(18px);
            text-align: center;
        }

        h2 {
            margin-bottom: 24px;
            font-size: 2rem;
            letter-spacing: 0.12em;
            color: #8fb7ff;
            text-transform: uppercase;
        }

        input,
        select {
            width: 100%;
            padding: 18px 22px;
            margin: 14px 0;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(108, 147, 255, 0.24);
            color: #e9f2ff;
            font-size: 16px;
            outline: none;
            transition: all 0.35s ease;
        }

        input:hover,
        select:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(48, 141, 241, 0.4);
        }

        input:focus,
        select:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(37, 117, 252, 0.9);
            box-shadow: 0 0 18px rgba(37, 117, 252, 0.22);
            transform: translateY(-1px);
        }

        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
            -webkit-text-fill-color: #07090b !important;
            -webkit-box-shadow: 0 0 0px 1000px rgba(255, 255, 255, 0.06) inset !important;
            box-shadow: 0 0 0px 1000px rgba(255, 255, 255, 0.06) inset !important;
            background-color: rgba(255, 255, 255, 0.06) !important;
            background-image: none !important;
        }

        input::placeholder,
        select::placeholder {
            color: rgba(255, 255, 255, 0.45);
            font-weight: 300;
        }

        select {
            appearance: none;
            background-image: linear-gradient(45deg, transparent 50%, #79b6ff 50%),
                              linear-gradient(135deg, #79b6ff 50%, transparent 50%);
            background-position: calc(100% - 20px) calc(1em + 2px), calc(100% - 15px) calc(1em + 2px);
            background-size: 8px 8px, 8px 8px;
            background-repeat: no-repeat;
            color: #8a92a787;
            background-color: rgba(255, 255, 255, 0.06);
        }

        select option {
            color: #050816;
            background-color: #f7fbff;
        }

        select option:checked,
        select option[selected] {
            color: #050816;
            background-color: #f7fbff;
        }

        select option[disabled] {
            color: rgba(255, 255, 255, 0.6);
            background-color: rgba(223, 30, 30, 0.08);
        }

        .btn-auth {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(135deg, #4b7bff, #44ffd4);
            color: #050816;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 18px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 30px rgba(68, 255, 212, 0.2);
        }

        .footer-link {
            margin-top: 22px;
            color: #b8d4ff;
            font-size: 14px;
        }

        .footer-link a {
            color: #72d7ff;
            text-decoration: none;
            font-weight: 700;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }

        ::placeholder {
            color: rgba(255, 255, 255, 0.45);
            font-weight: 300;
        }

        @media (max-width: 520px) {
            .auth-card {
                padding: 28px;
                border-radius: 24px;
            }

            h2 {
                font-size: 1.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-card">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div id="flash-msg" style="padding: 12px; margin-bottom: 20px; border-radius: 10px; text-align: center; font-weight: bold;
                          {{ 'background:#e74c3c; color:white;' if category == 'danger' else 'background:#22b87a; color:white;' }}">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <h2>SIGN UP</h2>
        <form action="/signup" method="POST">
            <input type="text" name="first_name" placeholder="First Name" required>
            <input type="text" name="last_name" placeholder="Last Name" required>
            <input type="email" name="username" placeholder="Username@gmail.com" 
                   pattern=".+@gmail\.com" title="Must be a valid @gmail.com address" required>
            <input type="password" name="password" placeholder="Password (min 8 characters)" 
                   pattern=".{8,}" title="Password must be at least 8 characters" required>
            <select name="security_question" required>
                <option value="" disabled selected hidden>Select a security question</option>
                <option value="What was your first school's name?">What was your first school's name?</option>
                <option value="What city were you born in?">What city were you born in?</option>
                <option value="What is your childhood nickname?">What is your childhood nickname?</option>
            </select>
            <input type="password" name="security_answer" placeholder="Security Answer" required>
            <button type="submit" class="btn-auth">REGISTER</button>
        </form>
        <p class="footer-link">Already have an account? <a href="/login">Login</a></p>
    </div>

<script src="{{ url_for('static', filename='pwa.js') }}" defer></script>
    <script>
        setTimeout(function() {
            var msg = document.getElementById("flash-msg");
            if (msg) {
                msg.style.display = "none";
            }
        }, 5000); 
    </script>
</body>
</html>
