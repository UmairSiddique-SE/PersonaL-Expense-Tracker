<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Expense Tracker</title>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#0056b3">
    <link rel="icon" href="{{ url_for('static', filename='logo.png') }}" sizes="192x192">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='logo.png') }}">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Expense Tracker">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background: radial-gradient(circle at top left, rgba(109, 79, 255, 0.26), transparent 24%),
                        radial-gradient(circle at bottom right, rgba(34, 235, 196, 0.16), transparent 26%),
                        linear-gradient(180deg, #02040d 0%, #060817 45%, #05050d 100%);
            color: #f2f8ff;
            padding: 20px;
        }

        .auth-card {
            width: min(460px, 100%);
            position: relative;
            background: rgba(8, 12, 28, 0.94);
            border-radius: 36px;
            padding: 44px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 34px 95px rgba(3, 9, 32, 0.55);
            backdrop-filter: blur(22px);
            overflow: hidden;
            text-align: center;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            inset: -18% -25%;
            background: radial-gradient(circle at top center, rgba(109, 79, 255, 0.28), transparent 40%),
                        radial-gradient(circle at bottom right, rgba(33, 217, 205, 0.18), transparent 36%);
            pointer-events: none;
        }

        h2 {
            position: relative;
            z-index: 1;
            margin-bottom: 24px;
            font-size: 2rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            background: linear-gradient(135deg, #56e6ff, #8b81ff, #e4f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        input,
        select {
            width: 100%;
            padding: 18px 22px;
            margin: 14px 0;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(96, 145, 255, 0.22);
            color: #eef4ff;
            font-size: 16px;
            outline: none;
            transition: all 0.35s ease;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
            position: relative;
            z-index: 1;
        }

        input:hover,
        select:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(90, 199, 255, 0.55);
        }

        input:focus,
        select:focus {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(58, 169, 255, 0.95);
            box-shadow: 0 0 24px rgba(58, 169, 255, 0.16);
            transform: translateY(-1px);
        }

        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
            -webkit-text-fill-color: #eef4ff !important;
            -webkit-box-shadow: 0 0 0px 1000px rgba(255, 255, 255, 0.08) inset !important;
            box-shadow: 0 0 0px 1000px rgba(255, 255, 255, 0.08) inset !important;
            background-color: rgba(255, 255, 255, 0.08) !important;
        }

        select {
            appearance: none;
            background-image: linear-gradient(45deg, transparent 50%, #72d9ff 50%),
                              linear-gradient(135deg, #72d9ff 50%, transparent 50%);
            background-position: calc(100% - 20px) calc(1em + 2px), calc(100% - 15px) calc(1em + 2px);
            background-size: 8px 8px, 8px 8px;
            background-repeat: no-repeat;
            color: #f7fbff;
            background-color: rgba(255, 255, 255, 0.06);
        }

        select option {
            color: #050816;
            background-color: #f7fbff;
        }

        select option:checked,
        select option[selected] {
            color: #050816;
            background-color: #f7fbff;
        }

        select option[disabled] {
            color: rgba(255, 255, 255, 0.7);
            background-color: rgba(255, 255, 255, 0.08);
        }

        .btn-auth {
            width: 100%;
            padding: 18px;
            border-radius: 24px;
            border: none;
            background: linear-gradient(135deg, #5c8fff, #35ffe8);
            color: #071428;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 18px;
            transition: transform 0.3s ease, box-shadow 0.3s ease, filter 0.3s ease;
            box-shadow: 0 18px 30px rgba(40, 171, 255, 0.22);
            position: relative;
            z-index: 1;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 38px rgba(53, 233, 212, 0.28);
            filter: saturate(1.08);
        }

        .footer-link {
            margin-top: 24px;
            color: #b8d4ff;
            font-size: 14px;
            position: relative;
            z-index: 1;
        }

        .footer-link a {
            color: #7be4ff;
            text-decoration: none;
            font-weight: 700;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }

        ::placeholder {
            color: rgba(255, 255, 255, 0.5);
            font-weight: 300;
        }

        @media (max-width: 520px) {
            .auth-card {
                padding: 32px;
                border-radius: 26px;
            }

            h2 {
                font-size: 1.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-card">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div id="flash-msg" style="padding: 12px; margin-bottom: 20px; border-radius: 10px; text-align: center; font-weight: bold;
                          {{ 'background:#e74c3c; color:white;' if category == 'danger' else 'background:#22b87a; color:white;' }}">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <h2>SIGN UP</h2>
        <form action="/signup" method="POST">
            <input type="text" name="first_name" placeholder="First Name" required>
            <input type="text" name="last_name" placeholder="Last Name" required>
            <input type="email" name="username" placeholder="Username@gmail.com" 
                   pattern=".+@gmail\.com" title="Must be a valid @gmail.com address" required>
            <input type="password" name="password" placeholder="Password (min 8 characters)" 
                   pattern=".{8,}" title="Password must be at least 8 characters" required>
            <select name="security_question" required>
                <option value="" disabled selected hidden>Select a security question</option>
                <option value="What was your first school's name?">What was your first school's name?</option>
                <option value="What city were you born in?">What city were you born in?</option>
                <option value="What is your nick name?">What is your nick name?</option>
            </select>
            <input type="text" name="security_answer" placeholder="Security Answer" required>
            <button type="submit" class="btn-auth">REGISTER</button>
        </form>
        <p class="footer-link">Already have an account? <a href="/login">Login</a></p>
    </div>

<script src="{{ url_for('static', filename='pwa.js') }}" defer></script>
    <script>
        setTimeout(function() {
            var msg = document.getElementById("flash-msg");
            if (msg) {
                msg.style.display = "none";
            }
        }, 5000); 
    </script>
</body>
</html>
