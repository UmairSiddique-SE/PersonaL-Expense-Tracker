<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense</title>
    <link rel="stylesheet" href="/static/summary-style.css">
    <style>
        body {
            background-color: #030712;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        
        nav {
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px; 
            background: #0B1026; 
            color: white; 
            border-bottom: 1px solid #2962FF;
        }

        .form-container {
            max-width: 300px;
            margin: 60px auto;
            padding: 30px;
            background: #0B1026;
            border: 1px solid #2962FF;
            border-radius: 8px;
            box-shadow: 0px 4px 15px rgba(41, 98, 255, 0.2);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #a0aec0;
        }

        input[type="number"], 
        input[type="text"], 
        input[type="date"], 
        select {
            width: 100%;
            background: #030712;
            color: white;
            border: 1px solid #2962FF;
            padding: 12px;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #00E5FF;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        .btn-submit {
            width: 100%;
            background: #2962FF;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background: #1546d6;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #2962FF;
            text-decoration: none;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<nav style="display: flex; justify-content: space-between; align-items: center; padding: 15px 1px; background: #0B1026; color: white; border-bottom: 1px solid #2962FF;">
    <div style="font-weight: bold; font-size: 14px; color: #2962FF;">Expense Tracker</div>
    <div style="font-size: 11px;">
        {% if session and session.get('user_id') %}
            <span style="margin-right: 10px; color: #a0aec0;">Hi, {{ session.get('user_name', 'User') }}</span>
            <a href="/logout" style="color: #ff4d4d; text-decoration: none; font-weight: bold;">Logout</a>
        {% else %}
            <a href="/login" style="color: #2962FF; text-decoration: none;">Login</a>
        {% endif %}
    </div>
   </nav>

<div class="form-container">
    <h2 style="text-align: center; color: #2962FF; margin-top: 0; margin-bottom: 25px;">Add New Expense</h2>
    
    <form action="/add" method="POST">
        <div class="form-group">
            <label>Amount</label>
            <input type="number" name="amount" step="0.01" required placeholder="0.00">
        </div>
        
        <div class="form-group">
            <label>Category</label>
            <select name="category" required>
                <option value="Food">Food</option>
                <option value="Travel">Travel</option>
                <option value="Bills">Bills</option>
                <option value="Shopping">Shopping</option>
                <option value="Others">Others</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Date</label>
            <input type="date" name="date" required>
        </div>
        
        <div class="form-group">
            <label>Description</label>
            <input type="text" name="description" placeholder="Optional notes...">
        </div>
        
        <button type="submit" class="btn-submit">Add Expense</button>
    </form>
    
    <a href="/view" class="back-link">← Back to Expenses</a>
</div>

</body>
</html>
