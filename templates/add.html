<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense | Expense Tracker</title>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#0056b3">
    <link rel="icon" href="{{ url_for('static', filename='logo.png') }}" sizes="192x192">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='logo.png') }}">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Expense Tracker">
    <link rel="stylesheet" href="{{ url_for('static', filename='add-style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Expense Tracker Logo">
        <a href="/dashboard" class="logo">Expense<span>Tracker</span></a>
        </div>
        <div class="user-info">
            <span class="user-name">Hi, {{ session.get('first_name', 'User') }}</span>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
    </nav>

    <main class="page-shell">
        <section class="form-panel">
            <div class="card-header">
                <div>
                    <h1>Add New Expense</h1>
                    <p class="subtitle">Enter your latest spending and keep your dashboard up to date.</p>
                </div>
            </div>

            <form class="form-card" action="/add" method="POST">
                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" name="amount" step="0.01" required placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select name="category" required>
                        <option value="Food">Food</option>
                        <option value="Travel">Travel</option>
                        <option value="Bills">Bills</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Others">Others</option>
                        <option value="My Choice">My Choice</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" name="date" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" name="description" placeholder="Optional notes...">
                </div>
                <button type="submit" class="primary-btn">Add Expense</button>
            </form>

             <a class="back-link" href="{{ url_for('dashboard') }}">Back to Home</a>
        </section>
    </main>
</body>
</html>
