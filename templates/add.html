<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Summary</title>
    <link rel="stylesheet" href="/static/summary-style.css">
    <style>
        .date-input-container {
            margin: 20px auto;
            text-align: center;
        }
        
        /* Add Expense jaisa style */
        input[type="date"] {
            background: #0B1026;
            color: white;
            border: 1px solid #2962FF;
            padding: 12px;
            border-radius: 5px;
            width: 280px;
            font-size: 16px;
            cursor: pointer;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        .back-link-small {
            display: block;
            text-align: center;
            margin: 20px auto;
            font-size: 14px;
            color: #2962FF !important;
            text-decoration: underline;
            width: fit-content;
        }
    </style>
</head>
<body>
   <nav style="display:flex; justify-content:space-between; align-items:center; padding:20px; background:#0B1026; color:white; border-bottom: 1px solid #2962FF;">
    <div style="font-weight:bold; font-size:20px; color:#2962FF;">Expense Tracker</div>
    <div>
        {% if session.get('user_id') %}
            <span style="margin-right:15px; font-size:14px;">Hi, {{ session.get('user_name') }}</span>
            <a href="/logout" style="color:#ff4d4d; text-decoration:none; font-size:14px;">Logout</a>
        {% endif %}
    </div>
</nav>
