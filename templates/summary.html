<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Summary</title>
    <link rel="stylesheet" href="/static/summary-style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .chart-container { width: 100%; max-width: 400px; margin: 20px auto; }
        .summary-buttons { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .total-box { background: #f4f4f4; padding: 15px; border-radius: 10px; margin: 10px 0; text-align: center; }
    </style>
</head>
<body>

<div class="summary-container">
    <div class="summary-card-main">
        <h1>📊 Expense Summary</h1>
        
        <div class="summary-buttons">
            <a href="/summary?type=overall" class="btn">Overall</a>
            <a href="/summary?type=week" class="btn">Weekly</a>
            <a href="/summary?type=month" class="btn">Monthly</a>
        </div>

        <div class="total-box">
            <h3>Total: Rs {{ totals[view_type] }}</h3>
        </div>

        <div class="chart-container">
            <canvas id="myChart"></canvas>
        </div>

        <a href="/" class="back-link">Back to Home</a>
    </div>
</div>

<script>
    const ctx = document.getElementById('myChart').getContext('2d');
    new Chart(ctx, {
        type: 'pie',
        data: {
            labels: [{% for cat in data[view_type].keys() %}'{{ cat }}',{% endfor %}],
            datasets: [{
                data: [{% for val in data[view_type].values() %}{{ val }},{% endfor %}],
                backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF']
            }]
        },
        options: { responsive: true }
    });
</script>

</body>
</html>
