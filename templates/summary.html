<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Summary</title>
    <link rel="stylesheet" href="/static/summary-style.css">
</head>
<body>

<div class="summary-container">
    <div class="summary-card-main">
        <h1>📊 {{ view_type.capitalize() }} Summary</h1>
        
        <div class="summary-buttons">
            <a href="/summary?type=overall" class="btn">Overall</a>
            <a href="/summary?type=week" class="btn">Weekly</a>
            <a href="/summary?type=month" class="btn">Monthly</a>
        </div>

   <div class="total-box" style="background: rgba(255, 255, 255, 0.05); border-top: 1px solid rgba(255, 255, 255, 0.1); border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding: 20px; margin: 20px 0; text-align: center; color: white; width: 100%; box-sizing: border-box;">
    <h2 style="margin: 0; font-size: 1.5rem; opacity: 0.9;">Total: Rs {{ totals[view_type] }}</h2>
</div>

        <div class="summary-cards">
            {% if data[view_type] %}
                {% for cat, total in data[view_type].items() %}
                <div class="summary-card">
                    <h3>{{ cat }}</h3>
                    <p>Rs {{ total }}</p>
                </div>
                {% endfor %}
            {% else %}
                <p class="no-data">No data found for this view!</p>
            {% endif %}
        </div>

        <a href="/" class="back-link" style="display:block; margin-top:20px;">Back to Home</a>
    </div>
</div>

</body>
</html>
