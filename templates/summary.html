<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Summary</title>
    <link rel="stylesheet" href="/static/summary-style.css">
    <style>
        /* Calendar ka exact design */
        .date-input-container {
            margin: 15px auto;
            text-align: center;
        }
        
        input[type="date"] {
            background: #ffffff;
            color: #000000;
            border: 1px solid #ccc;
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            width: 200px;
        }

        /* Back to Home ka chhota size */
        .back-link-small {
            display: block;
            text-align: center;
            margin: 20px auto;
            font-size: 12px;
            color: #888 !important;
            text-decoration: underline;
            width: fit-content;
        }
    </style>
</head>
<body>
   <nav style="display:flex; justify-content:space-between; align-items:center; padding:20px; background:#0B1026; color:white; border-bottom: 1px solid #2962FF;">
    <div style="font-weight:bold; font-size:20px; color:#2962FF;">Expense Tracker</div>
</nav>

<div class="summary-container">
    <div class="summary-card-main">
        <h1>📊 {{ view_type.capitalize() }} Summary</h1>
        
        <div class="date-input-container">
            <form action="/summary" method="GET">
                <input type="hidden" name="type" value="daily">
                <label style="color: white; display: block; margin-bottom: 5px;">Select Date</label>
                <input type="date" name="date" value="{{ selected_date }}" onchange="this.form.submit()">
            </form>
        </div>

        <div class="summary-buttons">
            <a href="/summary?type=overall" class="btn">Overall</a>
            <a href="/summary?type=weekly" class="btn">Weekly</a>
            <a href="/summary?type=monthly" class="btn">Monthly</a>
        </div>

        <div class="total-box" style="background: rgba(255, 255, 255, 0.05); padding: 20px; margin: 20px 0; text-align: center; color: white;">
            <h2 style="margin: 0; font-size: 1.5rem;">Total: Rs {{ totals.get(view_type, 0) }}</h2>
        </div>

        <div class="summary-cards">
            {% if data[view_type] %}
                {% for cat, total in data[view_type].items() %}
                <div class="summary-card">
                    <h3>{{ cat }}</h3>
                    <p>Rs {{ total }}</p>
                </div>
                {% endfor %}
            {% else %}
                <p style="text-align: center; color: #fff;">No data found!</p>
            {% endif %}
        </div>

        <a href="/dashboard" class="back-link-small">Back to Home</a>
    </div>
</div>
</body>
</html>
