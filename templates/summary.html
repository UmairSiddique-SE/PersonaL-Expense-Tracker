<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Summary</title>
    <link rel="stylesheet" href="/static/summary-style.css">
    <style>
        /* CSS jo aapke existing theme se match karti hai */
        .date-input-container {
            margin: 20px 0;
            text-align: center;
        }
        input[type="date"] {
            background: rgba(20, 35, 80, 0.8);
            color: white;
            border: 1px solid #4a6cf7;
            padding: 12px;
            border-radius: 12px;
            width: 250px;
            font-size: 16px;
            cursor: pointer;
        }
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }
    </style>
</head>
<body>

<div class="summary-container">
    <div class="summary-card-main">
        <h1>📊 {{ view_type.capitalize() }} Summary</h1>
        
        <div class="date-input-container">
            <form action="/summary" method="GET">
                <input type="hidden" name="type" value="daily">
                <label style="display:block; margin-bottom: 8px; font-weight: bold;">Select Date</label>
                <input type="date" name="date" value="{{ selected_date }}" onchange="this.form.submit()">
            </form>
        </div>

        <div class="summary-buttons">
            <a href="/summary?type=overall" class="btn">Overall</a>
            <a href="/summary?type=weekly" class="btn">Weekly</a>
            <a href="/summary?type=monthly" class="btn">Monthly</a>
        </div>

        <div class="total-box" style="background: rgba(20, 35, 80, 0.6); padding: 20px; margin: 20px 0; border-radius: 15px; border: 1px solid #4a6cf7;">
            <h2 style="margin: 0; font-size: 1.5rem;">Total: Rs {{ totals.get(view_type, 0) }}</h2>
        </div>

        <div class="summary-cards">
            {% if data[view_type] %}
                {% for cat, total in data[view_type].items() %}
                <div class="summary-card">
                    <h3>{{ cat }}</h3>
                    <p>Rs {{ total }}</p>
                </div>
                {% endfor %}
            {% else %}
                <p class="no-data">No data found for this selection!</p>
            {% endif %}
        </div>

        <div style="text-align: center; margin-top: 10px;">
            <a href="/dashboard" style="font-size: 12px; color: #aaa; text-decoration: underline;">Back to Home</a>
        </div>
    </div>
</div>

</body>
</html>
