<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Expense Tracker</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #050505 0%, #0d0d1a 100%); color: #ffffff; min-height: 100vh; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 25px 60px; }
        .logo { font-weight: 800; font-size: 26px; color: #fff; }
        .container { max-width: 1000px; margin: 80px auto; padding: 0 20px; }
        .header h1 { font-size: 50px; }
        .highlight { background: linear-gradient(90deg, #6a11cb, #2575fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 50px; }
        .card { background: #111115; padding: 50px 30px; border-radius: 25px; text-align: center; text-decoration: none; color: white; border: 1px solid #222; transition: 0.4s; }
        .card:hover { border: 1px solid transparent; background: linear-gradient(#111115, #111115) padding-box, linear-gradient(135deg, #6a11cb, #2575fc) border-box; box-shadow: 0 0 30px rgba(106, 17, 203, 0.4); transform: translateY(-10px); }
        .summary-card { grid-column: span 2; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">ExpenseTracker</div>
        <div>Hi, {{ session.get('first_name') }}! | <a href="/logout" style="color:#ff4d4d; text-decoration:none;">Logout</a></div>
    </nav>
    <div class="container">
        <div class="header"><h1>Good Evening, <br><span class="highlight">{{ session.get('first_name', 'User') }}!</span></h1></div>
        <div class="grid">
            <a href="/add" class="card"><h2>➕ Add Expense</h2></a>
            <a href="/view" class="card"><h2>📋 View Records</h2></a>
            <a href="/summary" class="card summary-card"><h2>📊 View Summary</h2></a>
        </div>
    </div>
</body>
</html>
