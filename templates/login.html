<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Expense Tracker</title>
<style>
    /* Global Styles: Poori website ke liye default settings */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

    /* Body: Screen ke center mein content lane ke liye aur dark background gradient */
    body { 
        height: 100vh; 
        display: flex; 
        hover: #1a2a50;
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
        background: radial-gradient(circle at center, #1a2a50, #05070a); 
        color: white;
    }

    /* Header: Logo aur Titles ki positioning */
    .header-section { text-align: center; margin-bottom: 30px; }
    .header-section img { 
        width: 130px; height: 130px; margin-bottom: 10px; 
        border-radius: 50%; border: 2px solid #446dcd; hover: #2161f6; /* Logo par blue border */
    }
    .header-section img:hover { border-color: #2161f6; }
      input:hover { 
        background: rgba(255, 255, 255, 0.06); 
        border: 2px solid rgba(39, 89, 225, 0.3); /* Subtle blue outline */
          transform: translateY(-5px); /* Yahan se input upar uthega */
        box-shadow: 0 8px 25px rgba(41, 98, 255, 0.2); /* Shadow gehri hogi */
    }
    .header-section h1 { font-size: 40px; font-weight: 800; }
    .header-section p { color: #8892b0; font-size: 14px; }

    /* Auth Card: Glassmorphism effect (blur aur transparency) */
    .auth-card { 
        background: rgba(255, 255, 255, 0.05); 
        padding: 30px; 
        border-radius: 20px; 
        backdrop-filter: blur(15px); /* Background ko blur karne ke liye */
        border: 1px solid rgba(255, 255, 255, 0.1);
        width: 100%; 
        max-width: 400px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* Card ki shadow */
    }

/* Input Fields: Aesthetic, Equal & Professional */
    input { 
        width: 100%;
        margin: 20px 0;
        padding: 15px 20px;         /* Padding balance ki gayi hai */
        border-radius: 12px;        /* Corner radius barabar rakha hai */
        border: 2px solid rgba(11, 110, 237, 0.05); /* Hidden border */
        outline: none;
        font-size: 16px;
        color: #ffffff; 
        background: rgba(255, 255, 255, 0.03); /* Light glass tint */
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); /* Professional animation */
    }
    
    /* Input Hover: Mouse le jane par glass effect badhega */
    input:hover { 
        background: rgba(255, 255, 255, 0.06); 
        border: 2px solid rgba(39, 89, 225, 0.3); /* Subtle blue outline */
        transform: translateY(-5px); /* Yahan se input upar uthega */
        box-shadow: 0 8px 25px rgba(41, 98, 255, 0.2); /* Shadow gehri hogi */
    }
    

    /* Focus: Click karne par neon glow effect */
    input:focus { 
        background: rgba(255, 255, 255, 0.08);
        border: 2px solid #2962FF; 
        box-shadow: 0 0 20px rgba(41, 98, 255, 0.25); /* Professional neon glow */
    }

    /* Placeholder text styling */
    input::placeholder {
        color: rgba(255, 255, 255, 0.3);
    }
    /* Button: Sign in button ka style */
    .btn-auth { 
        width: 100%; padding: 15px; background: #2962FF; color: white; 
        border: none; border-radius: 12px; font-weight: bold; cursor: pointer; 
        text-transform: uppercase; transition: 0.3s; 
    }
    /* Button Hover: Mouse jane par color change */
    .btn-auth:hover { background: #1e4ed9; }
    

    /* Footer: 'Create an account' link ka style */
    .footer-link { margin-top: 20px; text-align: center; font-size: 14px; color: #666; }
    .footer-link a { color: #2962FF; text-decoration: none; font-weight: 600; }

</style>
</head>
<body>

    <div class="header-section">
        <img src="/static/logo.png" alt="Logo">
        <h1>Expense Tracker</h1>
        <p>Elegant Finance Management</p>
    </div>

    <div class="auth-card">
        <form action="/login" method="POST">
            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="👤eg.user@gmail.com" required>
            </div>
            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" name="password" placeholder="🔒••••••••" required>
            </div>
            <button type="submit" class="btn-auth">SIGN IN</button>
        </form>
        <div class="footer-link">
            New here? <a style="color: #2962FF; text-decoration: none; font-weight: 600;transition: 0.3s; font-size: 18px;" href="/signup">Create an account</a>
        </div>
    </div>

</body>
</html>
