<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Expense Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body { 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: radial-gradient(circle at center, #1a2a50, #05070a); 
            color: white;
        }

        .header-section { text-align: center; margin-bottom: 25px; }
        .header-section img { 
            width: 120px; height: 120px; border-radius: 50%; 
            border: 3px solid #446dcd; transition: 0.3s;
        }
        .header-section img:hover { border-color: #2161f6; transform: scale(1.05); }

        /* Card: Compact size */
        .auth-card { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 30px; 
            border-radius: 25px; 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%; 
            max-width: 380px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        /* Input Fields: Equal aur Compact */
        input { 
            width: 100%;
            margin: 10px 0;
            padding: 18px 20px; 
            border-radius: 15px;
            border: 2px solid rgba(11, 110, 237, 0.1); 
            outline: none;
            font-size: 16px;
            color: #fff; 
            background: rgba(255, 255, 255, 0.03); 
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.2);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        input:hover { 
            background: rgba(255, 255, 255, 0.06); 
            border-color: rgba(39, 89, 225, 0.5); 
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(41, 98, 255, 0.2);
        }

        input:focus { 
            background: rgba(255, 255, 255, 0.08);
            border-color: #2962FF; 
            box-shadow: 0 0 15px rgba(41, 98, 255, 0.3);
        }

        input::placeholder { color: rgba(255, 255, 255, 0.4); }

        .btn-auth { 
            width: 100%; padding: 16px; background: #2962FF; color: white; 
            border: none; border-radius: 15px; font-weight: bold; cursor: pointer; 
            text-transform: uppercase; transition: 0.3s; margin-top: 10px;
        }
        .btn-auth:hover { background: #1e4ed9; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(41, 98, 255, 0.3); }

        .footer-link { margin-top: 20px; text-align: center; font-size: 15px; color: #888; }
        .footer-link a { color: #2962FF; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="header-section">
        <img src="/static/logo.png" alt="Logo">
          <h1>Expense Tracker</h1>
        <p>Elegant Finance Management</p>
    </div>
<div class="auth-card">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div style="padding: 12px; margin-bottom: 20px; border-radius: 10px; text-align: center; font-weight: bold;
                      {{ 'background:#e74c3c; color:white;' if category == 'danger' else 'background:#22b87a; color:white;' }}">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <h2>LOGIN</h2>
    <form action="/login" method="POST">
        </form>
</div>
    <div class="auth-card">
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="👤 Username" required>
            <input type="password" name="password" placeholder="🔒 Password" required>
            <button type="submit" class="btn-auth">SIGN IN</button>
        </form>
        <div class="footer-link">
            New here? <a href="/signup">Create an account</a>
        </div>
    </div>

</body>
</html>
