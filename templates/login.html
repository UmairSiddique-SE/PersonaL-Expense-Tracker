<!DOCTYPE html>
<html>
<head>
    <title>Login - MessPro</title>
    <style>
        body { background: #0B1026; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .card { background: #151c36; padding: 40px; border-radius: 20px; width: 320px; text-align: center; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: #0B1026; color: white; }
        button { width: 100%; padding: 15px; background: #2962FF; border: none; border-radius: 15px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>MessPro</h2>
        <p>University Dining Management</p>
        <form method="POST">
            <input type="text" name="username" placeholder="Roll Number / Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">SIGN IN</button>
        </form>
        {% if get_flashed_messages() %}
            <p style="color:red;">{{ get_flashed_messages()[0] }}</p>
        {% endif %}
    </div>
</body>
</html>
