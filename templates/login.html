<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#0056b3">
    <link rel="icon" href="{{ url_for('static', filename='logo.png') }}" sizes="192x192">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Expense Tracker">
    <title>Login - Expense Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body { 
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow-x: hidden;
            background: radial-gradient(circle at center, #1a2a50, #05070a); color: white;
        } 
        h2 { text-align: center; margin-bottom: 10px; color: #31a2e4; letter-spacing: 1px; align-self: flex-start; }

        .header-section { text-align: center; margin-bottom: 30px; }
        .header-section img { 
            width: 100px; height: 100px; border-radius: 50%; border: 3px solid #2962FF; 
            transition: 0.4s; margin-bottom: 10px;
        }
        .header-section img:hover { box-shadow: 0 0 20px #2962FF; transform: scale(1.05); }

        .auth-card { 
            background: rgba(255, 255, 255, 0.03); padding: 40px; border-radius: 30px; 
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1);
            width: 80%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        /* VIP Input Styling */
        input {
            width: 100%; padding: 20px 25px; margin: 15px 0; border-radius: 18px;
            background: rgba(255, 255, 255, 0.03); border: 2px solid rgba(255, 255, 255, 0.05);
            color: #fff; font-size: 16px; outline: none;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        input:hover { background: rgba(255, 255, 255, 0.06); border-color: rgba(52, 66, 218, 0.5); }

        input:focus {
            background: #0f0f15; border: 2px solid transparent;
            background-image: linear-gradient(#0f0f15, #0f0f15), linear-gradient(90deg, #2a51e0, #2a51e0);
            background-origin: border-box; background-clip: padding-box, border-box;
            box-shadow: 0 0 20px rgba(57, 17, 203, 0.4); transform: scale(1.02);
        }

        /* VIP Button */
        .btn-signin {
            width: 100%; padding: 18px; border-radius: 18px; border: none;
            background: linear-gradient(90deg, #2575fc, #6a11cb);
            color: white; font-weight: bold; cursor: pointer;
            transition: 0.4s; font-size: 16px; margin-top: 10px;
        }

        .btn-signin:hover { box-shadow: 0 0 25px rgba(37, 117, 252, 0.5); transform: translateY(-3px); }

        .flash-container { margin-bottom: 18px; }
        .flash-message { padding: 14px 18px; border-radius: 14px; margin-bottom: 14px; font-weight: 600; }
        .flash-message.success { background: rgba(34, 184, 122, 0.18); color: #c5f7dc; border: 1px solid rgba(34, 184, 122, 0.45); }
        .flash-message.danger { background: rgba(231, 76, 60, 0.18); color: #ffd3d0; border: 1px solid rgba(231, 76, 60, 0.45); }
        .footer-link { margin-top: 25px; text-align: center; font-size: 15px; color: #888; }
        .footer-link a { color: #2962FF; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-section">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
        <h1>Expense Tracker</h1>
        <p style="color: #666;">Elegant Finance Management</p>
    </div>

    <div class="auth-card">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="flash-container">
              {% for category, message in messages %}
                <div class="flash-message {{ category }}">{{ message }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}
        <h2>Login Menu </h2>
        <form method="POST">
            
            <input type="text" name="username" placeholder="👤 Username" required>
            <input type="password" name="password" placeholder="🔒 Password" required>
             <a href="/forgot" style="color: #2962FF; text-decoration: underline;">Forgot password?</a><br>
            <button type="submit" class="btn-signin">SIGN IN</button>
        </form>
        <div class="footer-link">
           
            New here? <a href="/signup">Create an account</a>
        </div>
    </div>

</body>
</html>
