<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#0056b3">
    <link rel="icon" href="{{ url_for('static', filename='logo.png') }}" sizes="192x192">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='logo.png') }}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Expense Tracker">
    <title>Login - Expense Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body { 
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow-x: hidden;
            background: radial-gradient(circle at center, #1a2a50, #05070a); color: white;
            padding: 20px 10px;
        } 
        h2 { text-align: center; margin-bottom: 10px; color: #31a2e4; letter-spacing: 1px; align-self: flex-start; }

        .header-section { text-align: center; margin-bottom: 25px; }
        .header-section img { 
            width: 90px; height: 90px; border-radius: 50%; border: 3px solid #2962FF; 
            display: block;
            margin: 0 auto 10px;
            transition: all 0.3s ease;
        }
        .header-section img:hover { box-shadow: 0 0 20px #2962FF; transform: scale(1.05); }

        .auth-card { 
            background: rgba(255, 255, 255, 0.08); padding: 35px 30px; border-radius: 30px; 
            backdrop-filter: blur(20px); border: 1px solid rgba(68, 255, 212, 0.15);
            width: 100%; max-width: 420px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        }

        /* VIP Input Styling */
        input[type="text"], input[type="password"] {
            width: 100%; padding: 18px 22px; margin: 12px 0; border-radius: 18px;
            background: rgba(255, 255, 255, 0.03); border: 2px solid rgba(38, 50, 188, 0.3); color: #fff; font-size: 16px; outline: none;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.55);
        }

        input:hover { background: rgba(255, 255, 255, 0.12); border-color: rgba(38, 50, 188, 0.5); }

        input:focus {
            background: #0f0f15; border: 2px solid transparent;
            background-image: linear-gradient(#0f0f15, #0f0f15), linear-gradient(90deg, #2a51e0, #44ffd4);
            background-origin: border-box; background-clip: padding-box, border-box;
            box-shadow: 0 0 20px rgba(68, 255, 212, 0.3); transform: scale(1.01);
        }

        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            padding-right: 55px;
        }
        .toggle-eye {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            user-select: none;
            font-size: 18px;
            opacity: 0.7;
            transition: opacity 0.2s ease;
        }
        .toggle-eye:hover { opacity: 1; }

        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 14px 4px;
            font-size: 14px;
        }
        .remember-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #b0c4de;
            user-select: none;
        }
        .remember-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #2962FF;
            border-radius: 4px;
        }
        .forgot-link {
            color: #44ffd4;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }
        .forgot-link:hover { text-decoration: underline; }

        /* VIP Button */
        .btn-signin {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(135deg, #4b7bff, #44ffd4);
            color: #050816;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            font-size: 15px;
            letter-spacing: 1px;
        }

        .btn-signin:hover { box-shadow: 0 0 25px rgba(68, 255, 212, 0.4); transform: translateY(-2px); }

        .flash-container { margin-bottom: 18px; }
        .flash-message { padding: 14px 18px; border-radius: 14px; margin-bottom: 14px; font-weight: 600; }
        .flash-message.success { background: rgba(34, 184, 122, 0.18); color: #c5f7dc; border: 1px solid rgba(34, 184, 122, 0.45); }
        .flash-message.danger { background: rgba(231, 76, 60, 0.18); color: #ffd3d0; border: 1px solid rgba(231, 76, 60, 0.45); }
        
        .footer-link { margin-top: 22px; text-align: center; font-size: 15px; color: #88a0ca; }
        .footer-link a { color: #44ffd4; text-decoration: none; font-weight: bold; }

    </style>
</head>
<body>

    <div class="header-section">
        <a href="{{ url_for('index') }}" style="text-decoration: none; color: inherit;">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" loading="eager">
        </a>
        <h1>Expense Tracker</h1>
        <p style="color: #88a0ca;">Elegant Finance Management</p>
    </div>

    <div class="auth-card">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="flash-container">
              {% for category, message in messages %}
                <div class="flash-message {{ category }}">{{ message }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}
        
        <form method="POST" id="loginForm" autocomplete="on">
            <input type="text" id="username" name="username" placeholder="👤 Username" autocomplete="username" required>
            <div class="password-wrapper">
                <input type="password" id="password" name="password" placeholder="🔒 Password" autocomplete="current-password" required>
                <span class="toggle-eye" onclick="togglePassword('password', this)">👁️</span>
            </div>

            <div class="options-row">
                <label class="remember-label">
                    <input type="checkbox" id="remember_me" name="remember_me">
                    <span>Remember me</span>
                </label>
                <a href="{{ url_for('forgot') }}" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="btn-signin">SIGN IN</button>
        </form>

        <div class="footer-link">
            New here? <a href="{{ url_for('signup') }}">Create an account</a>
        </div>
    </div>

    <script>
        function togglePassword(id, icon) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = '🙈';
            } else {
                input.type = 'password';
                icon.textContent = '👁️';
            }
        }

        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const rememberCheckbox = document.getElementById('remember_me');

        // On Page Load: Restore remembered username & auto-trigger mobile native fingerprint prompt
        window.addEventListener('DOMContentLoaded', () => {
            const savedUser = localStorage.getItem('remembered_username');

            if (savedUser) {
                usernameInput.value = savedUser;
                rememberCheckbox.checked = true;

                // Automatically trigger native mobile fingerprint prompt
                setTimeout(() => {
                    triggerNativeFingerprint(savedUser);
                }, 400);
            }
        });

        // Save remembered username on form submission if Remember Me is checked
        loginForm.addEventListener('submit', () => {
            if (rememberCheckbox.checked) {
                localStorage.setItem('remembered_username', usernameInput.value.trim());
            } else {
                localStorage.removeItem('remembered_username');
            }
        });

        async function triggerNativeFingerprint(username) {
            if (!username) return;

            // Trigger browser/device native biometric prompt if WebAuthn is available
            if (window.PublicKeyCredential && navigator.credentials) {
                try {
                    const challenge = new Uint8Array(32);
                    window.crypto.getRandomValues(challenge);

                    const credential = await navigator.credentials.get({
                        publicKey: {
                            challenge: challenge,
                            timeout: 60000,
                            userVerification: "preferred"
                        }
                    });
                    
                    // Only log in if native fingerprint verification succeeded
                    if (credential) {
                        performBiometricLogin(username);
                    }
                } catch (e) {
                    console.log('Native fingerprint scan cancelled, failed, or no passkey:', e);
                    // Do NOT log in automatically on error/cancel - stay on login form for password entry
                }
            }
        }

        async function performBiometricLogin(username) {
            try {
                const response = await fetch('/biometric_login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username })
                });
                const resData = await response.json();
                if (resData.status === 'success') {
                    window.location.href = resData.redirect;
                }
            } catch (err) {
                console.error('Biometric login error:', err);
            }
        }
    </script>
</body>
</html>
