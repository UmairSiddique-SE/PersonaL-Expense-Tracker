<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="auth-container">
        <form id="signup-form" action="/signup" method="POST">
            <h2>Sign Up</h2>
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Get Started</button>
            <p>Already have account? <a href="#" onclick="toggle()">Login</a></p>
        </form>

        <form id="login-form" action="/login" method="POST" style="display:none;">
            <h2>Welcome Back</h2>
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
            <p>New user? <a href="#" onclick="toggle()">Sign Up</a></p>
        </form>
    </div>

    <script>
        function toggle() {
            document.getElementById('signup-form').style.display = (document.getElementById('signup-form').style.display === 'none') ? 'block' : 'none';
            document.getElementById('login-form').style.display = (document.getElementById('login-form').style.display === 'none') ? 'block' : 'none';
        }
    </script>
</body>
</html>
