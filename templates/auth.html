{% comment %} <!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>
    <style>
        body { background: #0B1026; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; margin: 0; }
        .card { background: #151c36; padding: 30px; border-radius: 20px; width: 300px; text-align: center; }
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; background: #0B1026; color: white; }
        button { width: 95%; padding: 12px; margin-top: 10px; background: #2962FF; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
        a { color: #2962FF; text-decoration: none; cursor: pointer; }
        .flash { color: #ff4d4d; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div style="position: absolute; top: 20px;">
        {% with messages = get_flashed_messages() %}{% if messages %}
            <p class="flash">{{ messages[0] }}</p>
        {% endif %}{% endwith %}
    </div>

    <div class="card" id="signup-div">
        <h2>Create Account</h2>
        <form action="/signup" method="POST">
            <input type="text" name="first_name" placeholder="First Name" required>
            <input type="text" name="last_name" placeholder="Last Name" required>
            <input type="email" name="username" placeholder="name@gmail.com" required>
            <input type="password" name="password" placeholder="Password (min 8 chars)" minlength="8" required>
            <button type="submit">SIGN UP</button>
        </form>
        <p>Already have an account? <a onclick="toggle()">Login</a></p>
    </div>

    <div class="card" id="login-div" style="display:none;">
        <h2>Expense Tracker</h2>
        <form action="/" method="POST">
            <input type="email" name="username" placeholder="name@gmail.com" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">SIGN IN</button>
        </form>
        <p>New user? <a onclick="toggle()">Sign Up</a></p>
    </div>

    <script>
        function toggle() {
            var s = document.getElementById('signup-div');
            var l = document.getElementById('login-div');
            s.style.display = (s.style.display === 'none') ? 'block' : 'none';
            l.style.display = (l.style.display === 'none') ? 'block' : 'none';
        }
    </script>
</body>
</html> {% endcomment %}
