<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Expensive Tracker</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0b1f44">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
</head>
<body>

<div class="hero">
    <div class="glass">
        <h1>Personal Expense Tracker</h1>
        <p class="tagline">Track money like a Pro</p>

        <div class="vip-cards">
            <a href="/add" class="vip-card">
                <span>➕</span>
                <h2>Add Expense</h2>
                <p>Save your daily spending</p>
            </a>
            <a href="/view" class="vip-card">
                <span>📋</span>
                <h2>View Records</h2>
                <p>Clean & organized history</p>
            </a>
            <a href="/summary" class="vip-card">
                <span>📊</span>
                <h2>Summary</h2>
                <p>Simple expense analysis</p>
            </a>
        </div>

        <footer class="footer">
            <p>Made with ❤️ by:</p>
            <span class="name">Umair Siddique</span>
        </footer>
    </div>
</div>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
      .then(() => console.log('Service Worker Registered'));
  }
</script>
</body>
</html>
