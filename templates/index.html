<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#0056b3">
    <link rel="icon" href="{{ url_for('static', filename='logo.png') }}" sizes="192x192">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='logo.png') }}">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Expense Tracker">
    <title>Expense Tracker | Welcome</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='index-style.css') }}">
</head>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            color: #f7fbff;
            background: radial-gradient(circle at top left, rgba(58, 123, 255, 0.22), transparent 35%),
                        radial-gradient(circle at bottom right, rgba(34, 209, 161, 0.18), transparent 28%),
                        linear-gradient(135deg, #05050c 0%, #0c122c 55%, #02030b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .container {
            width: min(760px, 100%);
            padding: 44px 36px;
            border-radius: 36px;
            background: rgba(8, 19, 61, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 34px 95px rgba(0, 0, 0, 0.42);
            backdrop-filter: blur(20px);
            text-align: center;
        }

        .hero-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            margin-bottom: 34px;
        }

        .hero-logo {
            width: 130px;
            height: 130px;
            border-radius: 150px;
            border: 2px solid rgba(37, 117, 252, 0.35);
            object-fit: cover;
            box-shadow: 0 0 45px rgba(17, 142, 214, 0.22);
            hover: {
                box-shadow: 0 0 60px rgba(37, 117, 252, 0.4);
                transform: scale(1.08);
            }
            
        }

        h1 {
            font-size: clamp(3rem, 4.4vw, 4.6rem);
            line-height: 1.02;
            letter-spacing: -0.04em;
        }

        .highlight {
            background: linear-gradient(90deg, #65f7ff, #7d5cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-text {
            color: #d0daf7;
            font-size: 1.05rem;
            max-width: 720px;
            line-height: 1.75;
        }

        h2 {
            font-size: 1.15rem;
            margin-bottom: 36px;
            color: #aab8dd;
            line-height: 1.8;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            justify-content: center;
        }

        .btn {
            padding: 16px 42px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
        }

        .btn-login {
            background: linear-gradient(90deg, #4a84ff, #35ffd0);
            color: #050816;
            box-shadow: 0 18px 40px rgba(54, 162, 255, 0.22);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 22px 48px rgba(54, 162, 255, 0.3);
        }

        .btn-signup {
            border: 2px solid rgba(93, 215, 203, 0.7);
            color: #d7f7ff;
            background: rgba(255, 255, 255, 0.04);
        }

        .btn-signup:hover {
            background: rgba(93, 215, 203, 0.14);
        }

        #install-app-button {
            display: none;
            margin-top: 22px;
            padding: 16px 42px;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            background: linear-gradient(90deg, #6f77ff, #2dd2b5);
            color: #050816;
            font-weight: 700;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        #install-app-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(45, 210, 181, 0.24);
        }

        @media (max-width: 680px) {
            .container {
                padding: 32px;
            }

            h1 {
                font-size: 2.8rem;
            }

            h2 {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="hero-header">
        <img class="hero-logo" src="{{ url_for('static', filename='logo.png') }}" alt="Expense Tracker Logo">
        <div>
            <h1>Welcome to <span class="highlight">Expense Tracker</span></h1>
            <p class="hero-text">Smart money management starts here.</p>
        </div>
    </div>
    
    <div class="btn-group">
        <a href="/login" class="btn btn-login">Login</a>
        <a href="/signup" class="btn btn-signup">Create Account</a>
    </div>
</div>

</body>
</html>
