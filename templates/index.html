<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Expense Tracker</title>
    <style>
        body { background-color: #05070a; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; min-height: 100vh; }
        
        /* Navbar Fix: Sidebar hata kar top pe laya hai */
        .navbar { display: flex; justify-content: space-between; padding: 20px 50px; background: #0b1026; }
        .logo { font-weight: bold; font-size: 22px; color: #2962FF; }

        /* Main Content Centered */
        .main-content { display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .welcome-header { text-align: center; margin-bottom: 40px; }
        .welcome-header h1 { font-size: 3rem; margin: 0; }

        /* Grid Cards Fix */
        .dashboard-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 300px); /* 2 columns for symmetry */
            gap: 25px; 
            max-width: 700px;
        }
        
        .card { 
            background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1); text-align: center;
            text-decoration: none; color: #fff; transition: 0.3s;
        }
        .card:hover { background: rgba(41, 98, 255, 0.1); transform: scale(1.02); }
        
        .footer { margin-top: 50px; color: #666; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">Expense Tracker</div>
    <div>
        <span style="margin-right:15px;">Hi, {{ session.get('first_name') }}</span>
        <a href="/logout" style="color:#ff4d4d; text-decoration:none;">Logout</a>
    </div>
</nav>

<div class="main-content">
    <div class="welcome-header">
        <h1>Hi, {{ session.get('first_name', 'User') }}! 👋</h1>
        <p>Manage your finances like a Pro</p>
    </div>

    <div class="dashboard-grid">
        <a href="/add" class="card"><h2>➕ Add Expense</h2></a>
        <a href="/view" class="card"><h2>📋 View Records</h2></a>
        <a href="/summary" class="card" style="grid-column: span 2;"><h2>📊 Summary</h2></a>
    </div>

    <div class="footer">Made with ❤️ by: Umair Siddique</div>
</div>

</body>
</html>
