<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Expense | Expense Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='edit-style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Expense<span>Tracker</span></div>
        <div class="user-info">
            <span class="user-name">Hi, {{ session.get('first_name', 'User') }}</span>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
    </nav>

    <main class="page-shell">
        <section class="form-panel">
            <div class="card-header">
                <div>
                    <h1>Edit Expense</h1>
                    <p class="subtitle">Update your expense details cleanly with a consistent app layout.</p>
                </div>
            </div>

            <form class="form-card" method="POST">
                <div class="form-group">
                    <label>Amount</label>
                    <input type="text" name="amount" placeholder="Amount" value="{{ expense.amount }}" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <input type="text" name="category" placeholder="Category" value="{{ expense.category }}" required>
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" name="date" value="{{ expense.date }}" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" name="description" placeholder="Description" value="{{ expense.description }}">
                </div>
                <button type="submit" class="primary-btn">Update Expense</button>
            </form>

            <a class="back-link" href="{{ url_for('view') }}">← Back to Records</a>
        </section>
    </main>
</body>
</html>
