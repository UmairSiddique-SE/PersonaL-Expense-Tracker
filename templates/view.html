<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Expenses</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='view-style.css') }}">
</head>
<body>
<div class="view-container">
    <div class="view-card">
        <h1>All Expenses</h1>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Amount</th>
                        <th>Category</th>
                        <th>Date</th>
                        <th>Description</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for expense in expenses %}
                    <tr>
                        <td>{{ expense.amount }}</td>
                        <td>{{ expense.category }}</td>
                        <td>{{ expense.date }}</td>
                        <td>{{ expense.description }}</td>
                        <td>
                            <a href="{{ url_for('edit', id=expense._id) }}" class="edit-btn">Edit</a>
                            <a href="{{ url_for('delete', id=expense._id) }}" class="delete-btn" onclick="return confirm('Are you sure?')">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <a class="back-link" href="{{ url_for('index') }}">Back to Home</a>
    </div>
</div>
</body>
</html>
